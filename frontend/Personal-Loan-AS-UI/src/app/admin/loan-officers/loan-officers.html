<!-- <app-header></app-header> -->

<section class="max-w-[1400px] mx-auto px-6 py-10 space-y-10">

  <!-- ================= HEADER CARD ================= -->
  <div class="bg-white rounded-3xl shadow-xl border border-slate-200 p-8
              flex flex-col md:flex-row md:items-center md:justify-between gap-6">

    <div>
      <h2 class="text-3xl font-bold text-slate-900">
        Loan Officers
      </h2>
      <p class="text-slate-500 mt-2 max-w-xl">
        Manage loan officers, their contact information, and profile details.
      </p>
    </div>

    <!-- ADD BUTTON -->
    <button (click)="openDialog()" class="inline-flex items-center gap-2 px-7 py-3 rounded-2xl
             bg-indigo-600 text-white text-sm font-semibold
             shadow-lg shadow-indigo-600/30
             hover:bg-indigo-700 hover:shadow-indigo-700/40
             transition-all duration-200">
      <span class="text-lg leading-none">＋</span>
      Add Loan Officer
    </button>
  </div>

  <!-- ================= LOADING ================= -->
  <div *ngIf="loading" class="text-center text-slate-500 py-10">
    Loading loan officers...
  </div>

  <!-- ================= ERROR ================= -->
  <div *ngIf="error" class="text-center text-red-600 py-6">
    {{ error }}
  </div>

  <!-- ================= TABLE CARD ================= -->
  <div *ngIf="!loading && !error" class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">

    <!-- TABLE HEADER -->
    <div class="px-8 py-5 border-b border-slate-200 bg-slate-50">
      <p class="text-sm font-semibold text-slate-700">
        Registered Officers
      </p>
    </div>

    <!-- TABLE -->
    <div class="overflow-x-auto">
      <table mat-table [dataSource]="dataSource" class="w-full text-sm">

        <!-- NAME -->
        <ng-container matColumnDef="fullName">
          <th mat-header-cell *matHeaderCellDef class="px-8 py-4 text-xs font-semibold text-slate-500">
            Name
          </th>
          <td mat-cell *matCellDef="let row" class="px-8 py-4 font-medium text-slate-800">
            {{ row.fullName }}
          </td>
        </ng-container>

        <!-- EMAIL -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef class="px-8 py-4 text-xs font-semibold text-slate-500">
            Email
          </th>
          <td mat-cell *matCellDef="let row" class="px-8 py-4 text-slate-600">
            {{ row.email }}
          </td>
        </ng-container>

        <!-- MOBILE -->
        <ng-container matColumnDef="mobileNumber">
          <th mat-header-cell *matHeaderCellDef class="px-8 py-4 text-xs font-semibold text-slate-500">
            Mobile
          </th>
          <td mat-cell *matCellDef="let row" class="px-8 py-4 text-slate-700">
            {{ row.mobileNumber }}
          </td>
        </ng-container>

        <!-- GENDER -->
        <ng-container matColumnDef="gender">
          <th mat-header-cell *matHeaderCellDef class="px-8 py-4 text-xs font-semibold text-slate-500">
            Gender
          </th>
          <td mat-cell *matCellDef="let row" class="px-8 py-4 text-slate-700">
            {{ row.gender }}
          </td>
        </ng-container>

        <!-- DOB -->
        <ng-container matColumnDef="dateOfBirth">
          <th mat-header-cell *matHeaderCellDef class="px-8 py-4 text-xs font-semibold text-slate-500">
            DOB
          </th>
          <td mat-cell *matCellDef="let row" class="px-8 py-4 text-slate-600">
            {{ row.dateOfBirth | date:'dd-MMM-yyyy' }}
          </td>
        </ng-container>

        <!-- ACTIONS -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="px-8 py-4 text-xs font-semibold text-slate-500">
            Actions
          </th>
          <td mat-cell *matCellDef="let row" class="px-8 py-4">
            <button (click)="openDialog(row)"
              class="px-4 py-2 rounded-xl text-sm font-medium text-indigo-600 hover:bg-indigo-50">
              Edit
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns" class="border-t border-slate-100 hover:bg-slate-50">
        </tr>

      </table>
    </div>
  </div>

</section>
