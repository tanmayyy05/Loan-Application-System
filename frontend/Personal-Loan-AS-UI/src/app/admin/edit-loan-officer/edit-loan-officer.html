<!-- ================= DIALOG CONTAINER ================= -->
<div class=" rounded-3xl shadow-2xl max-w-3xl mx-auto">

  <!-- ================= HEADER ================= -->
  <div class="px-8 py-6 border-b border-slate-200 flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-semibold text-slate-800">
        {{ isEdit ? 'Edit Loan Officer' : 'Add Loan Officer' }}
      </h2>
      <p class="text-sm text-slate-500 mt-1">
        {{ isEdit ? 'Update officer information' : 'Create a new loan officer account' }}
      </p>
    </div>

    <button (click)="close()" class="w-10 h-10 flex items-center justify-center
                   rounded-full text-slate-500
                   hover:bg-slate-100 transition">
      ✕
    </button>
  </div>

  <!-- ================= FORM ================= -->
  <form [formGroup]="form" class="px-8 py-8">

    <!-- GRID -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Full Name</mat-label>
        <input matInput formControlName="fullName">
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email">
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Mobile Number</mat-label>
        <input matInput formControlName="mobileNumber">
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Date of Birth</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="dateOfBirth">
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Gender</mat-label>
        <mat-select formControlName="gender">
          <mat-option value="Male">Male</mat-option>
          <mat-option value="Female">Female</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>City</mat-label>
        <input matInput formControlName="city">
      </mat-form-field>

      <mat-form-field appearance="outline" class="md:col-span-2">
        <mat-label>Address</mat-label>
        <input matInput formControlName="address">
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>State</mat-label>
        <input matInput formControlName="state">
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Pincode</mat-label>
        <input matInput formControlName="pincode">
      </mat-form-field>

    </div>

    <!-- ================= ACTION BAR ================= -->
    <div class="mt-10 flex justify-end gap-4">

      <button type="button" (click)="close()" class="px-6 py-2 rounded-xl
                       text-sm font-medium text-slate-600
                       hover:bg-slate-100 transition">
        Cancel
      </button>

      <button type="button" (click)="save()" [disabled]="form.invalid" class="px-8 py-2 rounded-xl
                       bg-indigo-600 text-white text-sm font-medium
                       shadow-lg shadow-indigo-600/30
                       hover:bg-indigo-700 hover:shadow-indigo-700/40
                       disabled:opacity-50 disabled:cursor-not-allowed
                       transition-all">
        {{ isEdit ? 'Update Officer' : 'Save Officer' }}
      </button>

    </div>

  </form>
</div>
