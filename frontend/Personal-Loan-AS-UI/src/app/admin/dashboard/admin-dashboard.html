<section class="grid grid-cols-1 md:grid-cols-2 gap-8">


<div class="bg-white rounded-3xl p-6 shadow-lg mt-10 flex justify-center">
  <div class="w-[260px] h-[260px]">
    <canvas id="dashboardPieChart"></canvas>
  </div>
</div>


  <div class="mb-4 flex items-center gap-4 ">
    <label class="text-sm font-medium text-slate-600">Filter Status</label>

    <select class="
         border border-slate-300 rounded
         px-3 py-2 text-sm truncate" [(ngModel)]="selectedStatus"
      (change)="onStatusChange()">

      <option *ngFor="let status of statuses" [value]="status">
        {{ status }}
      </option>
    </select>
  </div>


  <!-- ================= PENDING APPROVALS ================= -->
  <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">

    <!-- HEADER -->
    <div class="px-8 py-6 border-b border-slate-200 bg-slate-50
                flex items-center justify-between">

      <h2 class="text-lg font-semibold text-slate-800">
        Pending Admin Approvals
      </h2>

      <a routerLink="/loan-officer/applications" class="text-sm font-medium text-indigo-600 hover:underline">
        View loan officer dashboard
      </a>
    </div>



    <!-- TABLE -->
    <div class="overflow-x-auto">
      <table class="w-full text-sm">

        <thead class="text-left text-xs uppercase tracking-wide text-slate-500 bg-white">
          <tr class="border-b border-slate-200">
            <th class="px-8 py-4">Application ID</th>
            <th class="px-8 py-4">Applicant</th>
            <th class="px-8 py-4">Loan Type</th>
            <th class="px-8 py-4">Amount</th>
            <th class="px-8 py-4">Status</th>
            <th class="px-8 py-4">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let app of applications" class="border-b border-slate-100 hover:bg-slate-50 transition">

            <td class="px-8 py-4 font-medium text-slate-800">
              {{ app.applicationId }}
            </td>

            <td class="px-8 py-4 text-slate-700">
              {{ app.applicantName }}
            </td>

            <td class="px-8 py-4 text-slate-600">
              {{ app.loanType }}
            </td>

            <td class="px-8 py-4 text-slate-700">
              ₹{{ app.requestedAmount | number }}
            </td>

            <td class="px-8 py-4">
              <span class="px-2 py-1 rounded text-xs font-medium
            bg-green-100 text-green-700">
                {{ app.applicationStatus }}
              </span>
            </td>

            <td class="px-8 py-4">
              <button [disabled]="app.applicationStatus === 'SANCTION_LETTER_ACCEPTED'"
                [routerLink]="['/admin/applications', app.applicationId]"
                class="text-indigo-600 hover:underline text-sm font-medium disabled:text-gray-400">
                Review →
              </button>
            </td>


          </tr>
        </tbody>

      </table>
    </div>

  </div>

  <!-- ================= RECENT ACTIVITY ================= -->
  <div class="bg-white rounded-3xl shadow-xl border border-slate-200">

    <!-- HEADER -->
    <div class="px-8 py-6 border-b border-slate-200 bg-slate-50">
      <h2 class="text-lg font-semibold text-slate-800">
        Recent Activity
      </h2>
    </div>

    <!-- LIST -->
    <ul class="divide-y divide-slate-100">

      <li *ngFor="let act of activities" class="px-8 py-4 flex items-center justify-between
                 hover:bg-slate-50 transition">

        <span class="text-sm text-slate-700">
          {{ act.text }}
        </span>

        <span class="text-xs text-slate-400 whitespace-nowrap">
          {{ act.time }}
        </span>

      </li>

    </ul>
  </div>

</section>
