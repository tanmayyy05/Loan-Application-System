<section class="max-w-[1400px] mx-auto px-6 py-10 space-y-8">

    <!-- HEADER -->
    <div class="bg-white rounded-3xl shadow-xl border p-8">
        <h1 class="text-3xl font-bold">Loan Applications</h1>
        <p class="text-sm text-slate-500">
            Review, approve, or reject loan applications
        </p>
    </div>

    <!-- FILTER -->
    <div class="bg-white rounded-2xl shadow border p-6 flex gap-4 items-center">
        <span class="text-sm font-medium">Filter by status:</span>

        <select class="px-4 py-2 rounded-xl border" [(ngModel)]="statusFilter">

            <option value="ALL">All</option>
            <option value="PENDING_ADMIN">Pending Admin</option>
            <option value="APPROVED">Approved</option>
            <option value="REJECTED">Rejected</option>
        </select>
    </div>

    <!-- ================= TABLE CARD ================= -->
   <!-- <app-loan-officer-applications></app-loan-officer-applications> -->
    <app-admin-application-list></app-admin-application-list>

</section>
