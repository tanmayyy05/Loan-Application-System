<div class="flex items-center justify-between">
    <ng-container *ngFor="let stage of stages; let last = last">
        <div class="flex flex-col items-center">
            <div class="w-8 h-8 rounded-full flex items-center justify-center
         transition-all duration-300 ease-in-out" [ngClass]="{
    'bg-green-600 text-white scale-100': isCompleted(stage.key),
    'bg-blue-600 text-white scale-110 animate-pulse': isActive(stage.key),
    'bg-gray-300 text-gray-600 scale-100':
      !isCompleted(stage.key) && !isActive(stage.key)
  }">
                ✔
            </div>

            <span class="mt-2 text-xs text-center">
                {{ stage.label }}
            </span>
        </div>

        <div *ngIf="!last" class="flex-1 h-1 mx-2" [ngClass]="
        isCompleted(stage.key) ? 'bg-green-600' : 'bg-gray-300'
      "></div>
    </ng-container>
</div>
