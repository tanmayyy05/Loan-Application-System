<section class="min-h-[70vh] flex items-center justify-center px-6">

  <mat-card class="w-full max-w-xl rounded-3xl shadow-xl border border-gray-200 text-center p-8">

    <!-- Icon -->
    <div class="mx-auto mb-6 flex items-center justify-center
             w-20 h-20 rounded-full
             bg-red-100 text-red-600 text-4xl">
      ❌
    </div>

    <!-- Title -->
    <h2 class="text-2xl font-bold text-gray-800 mb-3">
      Not Eligible
    </h2>

    <!-- Description -->
    <p class="text-gray-600 text-sm leading-relaxed mb-8">
      Based on the information you provided, you currently do not meet the
      eligibility criteria for this loan.
      You may try again later or explore other available options.
    </p>

    <!-- Actions -->
    <div class="flex justify-center">
      <button mat-raised-button color="primary" (click)="backToDashboard()"
        class="px-8 py-2 rounded-xl font-medium shadow-md">
        Return to Dashboard
      </button>
    </div>

  </mat-card>

</section>
