<section class="px-8 py-6 max-w-7xl mx-auto">

    <!-- Header Card -->
    <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
        <h2 class="text-3xl font-bold text-gray-800">
            Loan Details
            <span class="text-gray-400 text-xl font-medium">— {{ loanId }}</span>
        </h2>
        <p class="text-gray-500 mt-1">Complete overview of your loan application</p>
    </div>

    <!-- Timeline Card -->
    <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
        <app-application-timeline [currentStage]="currentStage">
        </app-application-timeline>
    </div>

    <!-- Summary + Actions -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Loan Summary -->
        <div class="bg-white rounded-2xl shadow p-6">
            <h3 class="text-lg font-semibold mb-4 text-gray-800">
                Loan Summary
            </h3>

            <div class="space-y-3 text-sm text-gray-700">
                <p>
                    <span class="font-medium">Status:</span>
                    <span class="ml-2 px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">
                        {{ currentStatus }}
                    </span>
                </p>

                <p>
                    <span class="font-medium">Amount:</span>
                    <span class="ml-1">₹5,00,000</span>
                </p>

                <p>
                    <span class="font-medium">Tenure:</span>
                    <span class="ml-1">36 months</span>
                </p>
            </div>
        </div>

        <!-- Next Actions -->
        <div class="bg-white rounded-2xl shadow p-6 lg:col-span-2">
            <h3 class="text-lg font-semibold mb-4 text-gray-800">
                Next Actions
            </h3>

            <div class="flex flex-wrap gap-4 items-center">

                <button *ngIf="canUploadDocuments" [routerLink]="['/user/upload-documents', loanId]"
                    class="px-5 py-2.5 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700 transition">
                    Upload Documents
                </button>

                <button *ngIf="canPayEmi" [routerLink]="['/user/pay-emi', loanId]"
                    class="px-5 py-2.5 rounded-xl bg-green-600 text-white font-semibold hover:bg-green-700 transition">
                    Pay EMI
                </button>

                <span *ngIf="!canUploadDocuments && !canPayEmi" class="text-gray-500 text-sm">
                    No actions available at this stage
                </span>

            </div>
        </div>

    </div>

    <!-- Uploaded Documents -->
    <div class="bg-white rounded-2xl shadow-lg p-6 mt-6">
        <h3 class="text-lg font-semibold mb-4 text-gray-800">
            Uploaded Documents
        </h3>

        <table class="w-full text-sm">
            <thead class="bg-gray-100 text-gray-700">
                <tr>
                    <th class="p-3 text-left font-semibold">Document</th>
                    <th class="p-3 text-left font-semibold">Status</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let doc of documents" class="border-t hover:bg-gray-50 transition">
                    <td class="p-3 text-gray-800">
                        {{ doc.name }}
                    </td>

                    <td class="p-3">
                        <span class="px-3 py-1 rounded-full text-xs font-semibold" [ngClass]="{
                                'bg-green-100 text-green-700': doc.status === 'APPROVED',
                                'bg-yellow-100 text-yellow-700': doc.status === 'PENDING',
                                'bg-red-100 text-red-700': doc.status === 'REJECTED'
                            }">
                            {{ doc.status }}
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</section>
