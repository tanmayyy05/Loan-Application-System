<div class="login-page min-h-screen flex items-center justify-center
         bg-gradient-to-br from-neutral-900 via-slate-900 to-stone-900
         relative px-4">

    <!-- ambient shapes -->
    <div class="ambient-blob absolute -top-32 -left-32 w-[500px] h-[500px]
           bg-stone-700/20 rounded-full blur-3xl animate-float">
    </div>

    <div class="ambient-blob absolute bottom-0 right-0 w-[400px] h-[400px]
           bg-slate-700/20 rounded-full blur-3xl animate-float">
    </div>

    <!-- REGISTER CARD -->
    <div class="relative z-10 w-full max-w-lg
              rounded-2xl bg-stone-50/95 backdrop-blur-xl
              shadow-[0_30px_90px_-20px_rgba(0,0,0,0.7)]
              px-8 py-9">

        <div class="absolute inset-0 rounded-2xl
                bg-gradient-to-br from-white/60 to-transparent"></div>

        <div class="relative z-10">

            <!-- BRAND -->
            <div class="mb-6 text-center">
                <h2 class="text-4xl font-bold tracking-tight text-stone-900">
                    CrediFlow
                </h2>
                <p class="text-[10px] uppercase tracking-widest text-stone-500 mt-1">
                    Internal Loan System
                </p>
            </div>

            <!-- TITLE -->
            <div class="mb-6 text-left">
                <h3 class="text-lg font-medium text-stone-800">
                    Create your account
                </h3>
                <p class="text-sm text-stone-500 mt-1">
                    Secure registration for loan officers
                </p>
            </div>

            <!-- FORM -->
            <form [formGroup]="registerForm" (ngSubmit)="submit()" class="space-y-3">

                <!-- FULL NAME -->
                <input type="text" formControlName="fullName" placeholder="Full name" class="w-full px-4 py-2.5 rounded-lg
                 bg-transparent border border-stone-300
                 text-sm text-stone-900 placeholder-stone-400
                 focus:outline-none focus:border-stone-600
                 transition" />

                <!-- EMAIL -->
                <input type="email" formControlName="email" placeholder="Email address" class="w-full px-4 py-2.5 rounded-lg
                 bg-transparent border border-stone-300
                 text-sm text-stone-900 placeholder-stone-400
                 focus:outline-none focus:border-stone-600
                 transition" />

                <!-- MOBILE + DOB -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input type="tel" formControlName="mobileNumber" placeholder="Mobile number" class="w-full px-4 py-2.5 rounded-lg
                   bg-transparent border border-stone-300
                   text-sm text-stone-900 placeholder-stone-400
                   focus:outline-none focus:border-stone-600
                   transition" />

                    <input type="date" formControlName="dateOfBirth" class="w-full px-4 py-2.5 rounded-lg
                   bg-transparent border border-stone-300
                   text-sm text-stone-900
                   focus:outline-none focus:border-stone-600
                   transition" />
                </div>

                <!-- ADDRESS -->
                <textarea rows="2" formControlName="address" placeholder="Address" class="w-full px-4 py-2.5 rounded-lg
                 bg-transparent border border-stone-300
                 text-sm text-stone-900 placeholder-stone-400
                 focus:outline-none focus:border-stone-600
                 transition"></textarea>

                <!-- PASSWORD -->
                <input type="password" formControlName="password" placeholder="Password" class="w-full px-4 py-2.5 rounded-lg
                 bg-transparent border border-stone-300
                 text-sm text-stone-900 placeholder-stone-400
                 focus:outline-none focus:border-stone-600
                 transition" />

                <!-- SUBMIT -->
                <button type="submit" [disabled]="registerForm.invalid || loading" class="w-full mt-4 py-2.5 rounded-lg
                 text-sm font-medium tracking-wide
                 bg-stone-900 text-stone-100
                 hover:bg-black transition
                 disabled:bg-stone-400
                 disabled:cursor-not-allowed">

                    {{ loading ? 'Creating...' : 'Create account' }}
                </button>

                <p *ngIf="registerForm.invalid" class="text-xs text-stone-500 text-center mt-2">
                    Please fill all required fields correctly
                </p>

            </form>

            <!-- FOOTER -->
            <p class="text-xs text-stone-500 mt-5 text-center">
                Already have an account?
                <a routerLink="/login" class="text-stone-800 font-medium hover:underline">
                    Sign in
                </a>
            </p>

            <div class="mt-3 text-center">
                <a routerLink="/" class="text-xs text-stone-600 hover:text-stone-800 transition">
                    ← Back to home
                </a>
            </div>

        </div>
    </div>
</div>
