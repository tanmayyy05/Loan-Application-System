spring.application.name=LoanApplicationSystem


# ===============================
# DATABASE CONFIGURATION
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/loan_application_system2
spring.datasource.username=root
spring.datasource.password=301105
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# HIBERNATE / JPA CONFIG
# ===============================

# Dialect for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Show SQL in console
spring.jpa.show-sql=true

# Update tables automatically
spring.jpa.hibernate.ddl-auto=update

# Format the SQL output
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# JWT Configuration
# ==============================
jwt.secret=MySuperSecretKeyThatIsAtLeast32BytesLong!!


# Force Spring & Jackson to use IST
spring.jackson.time-zone=Asia/Kolkata

# Hibernate should NOT convert timezone
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# to upload documnet folder
#file.upload.dir=/uploads/loan-documents/

# ===============================
# File Upload Configuration (GLOBAL & PORTABLE)
# ===============================
# Priority:
# 1. Environment variable UPLOAD_DIR
# 2. Fallback to user home directory
file.upload.dir=${UPLOAD_DIR:${user.home}/loan-documents}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB


